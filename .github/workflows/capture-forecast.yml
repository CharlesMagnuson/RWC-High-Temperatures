name: Capture forecast
on:
  schedule:
    - cron: '5 7 * * *'
    - cron: '5 8 * * *'
  workflow_dispatch:

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      # Accepts hours 00-06 Pacific: GitHub has delivered scheduled runs up to
      # ~4 hours late (observed 2026-07-03), and a delayed run must not
      # silently drop the night's capture — forecasts cannot be backfilled. A
      # pre-dawn capture still records the overnight forecast. Under PDT both
      # crons pass the guard; the capture script is idempotent by day, so the
      # second run is a no-op.
      - name: Morning guard (00:00-06:59 Pacific)
        id: guard
        run: |
          H=$(TZ=America/Los_Angeles date +%H)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$H" -gt 6 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: Pacific hour is $H"
          fi
      - uses: actions/checkout@v7
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.guard.outputs.skip != 'true'
      - run: npm run capture:forecast
        if: steps.guard.outputs.skip != 'true'
      - name: Upload raw page on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wu-forecast-html
          path: artifacts/wu-forecast.html
          retention-days: 7
      - name: Commit data
        if: success() && steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "temperature-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/temperatures.json
          git diff --cached --quiet && exit 0
          git commit -m "data: forecast $(TZ=America/Los_Angeles date +%F)"
          git pull --rebase --autostash
          git push
