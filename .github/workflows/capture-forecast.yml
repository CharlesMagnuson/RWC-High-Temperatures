name: Capture forecast
on:
  schedule:
    - cron: '5 4 * * *' # 21:05 PDT the evening before the target day
    - cron: '5 5 * * *' # 21:05 PST (22:05 PDT in summer; idempotent no-op)
  workflow_dispatch:

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      # Accepts 21:00-23:59 and 00:00-06:59 Pacific. The capture targets
      # tomorrow's forecast from 21:05 the evening before; GitHub has delivered
      # scheduled runs up to ~4 hours late (observed 2026-07-03), and a delayed
      # run must not silently drop the capture — forecasts cannot be
      # backfilled. From 21:00 the script targets tomorrow; a run that slips
      # past midnight targets the day it lands on (the same forecast day).
      # Under PDT both crons pass the guard; the capture script is idempotent
      # by target day, so the second run is a no-op.
      - name: Evening guard (21:00-06:59 Pacific)
        id: guard
        run: |
          H=$(TZ=America/Los_Angeles date +%H)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$H" -ge 7 ] && [ "$H" -le 20 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: Pacific hour is $H"
          fi
      - uses: actions/checkout@v7
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.guard.outputs.skip != 'true'
      - run: npm run capture:forecast
        if: steps.guard.outputs.skip != 'true'
      - name: Upload raw page on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wu-forecast-html
          path: artifacts/wu-forecast.html
          retention-days: 7
      - name: Commit data
        if: success() && steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "temperature-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/temperatures.json
          git diff --cached --quiet && exit 0
          # From 21:00 the record is for tomorrow (mirrors pacificForecastTargetISO).
          H=$(TZ=America/Los_Angeles date +%H)
          if [ "$H" -ge 21 ]; then D=$(TZ=America/Los_Angeles date -d tomorrow +%F); else D=$(TZ=America/Los_Angeles date +%F); fi
          git commit -m "data: forecast $D"
          git pull --rebase --autostash
          git push
