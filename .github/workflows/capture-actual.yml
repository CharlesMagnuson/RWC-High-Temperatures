name: Capture actual
on:
  schedule:
    - cron: '5 1 * * *'
    - cron: '5 2 * * *'
  workflow_dispatch:

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      # Accepts any evening hour (18:00-23:59 Pacific): GitHub has delivered
      # scheduled runs up to ~4 hours late (observed 2026-07-03: the 18:05 and
      # 19:05 firings arrived at 21:46 and 22:53), and a late run still records
      # the correct daily high. Skipped runs are the wrong-season cron firing
      # before 18:00, and anything delayed past midnight (wrong date).
      - name: Evening guard (18:00-23:59 Pacific)
        id: guard
        run: |
          H=$(TZ=America/Los_Angeles date +%H)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$H" -lt 18 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: Pacific hour is $H"
          fi
      - uses: actions/checkout@v7
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.guard.outputs.skip != 'true'
      - run: npm run capture:actual
        if: steps.guard.outputs.skip != 'true'
        env:
          NETATMO_CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_ENC_PASSPHRASE: ${{ secrets.NETATMO_ENC_PASSPHRASE }}
          NETATMO_DEVICE_ID: ${{ secrets.NETATMO_DEVICE_ID }}
          NETATMO_MODULE_ID: ${{ secrets.NETATMO_MODULE_ID }}
      - name: Commit rotated token even on failure
        if: always() && steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "temperature-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add secrets/netatmo-tokens.enc
          git diff --cached --quiet && exit 0
          git commit -m "chore: rotate netatmo token"
          git pull --rebase --autostash
          git push
      - name: Commit data
        if: success() && steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "temperature-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/temperatures.json
          git diff --cached --quiet && exit 0
          git commit -m "data: actual $(TZ=America/Los_Angeles date +%F)"
          git pull --rebase --autostash
          git push
