name: Capture actual
on:
  schedule:
    - cron: '5 23 * * *' # 16:05 PDT
    - cron: '5 0 * * *' # 16:05 PST (17:05 PDT in summer; harmless re-capture)
  workflow_dispatch:

concurrency:
  group: data-commits
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      # Accepts 16:00-23:59 Pacific: the daily high never happens after 16:00
      # here, and GitHub has delivered scheduled runs up to ~4 hours late
      # (observed 2026-07-03: firings arrived 3h41m-3h48m behind schedule), so
      # the 16:05 target plus an 8-hour tolerance still records the correct
      # daily high. Skipped runs are the wrong-season cron firing before 16:00
      # and anything delayed past midnight (wrong date).
      - name: Afternoon guard (16:00-23:59 Pacific)
        id: guard
        run: |
          H=$(TZ=America/Los_Angeles date +%H)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$H" -lt 16 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: Pacific hour is $H"
          fi
      - uses: actions/checkout@v7
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        if: steps.guard.outputs.skip != 'true'
      - run: npm run capture:actual
        if: steps.guard.outputs.skip != 'true'
        env:
          NETATMO_CLIENT_ID: ${{ secrets.NETATMO_CLIENT_ID }}
          NETATMO_CLIENT_SECRET: ${{ secrets.NETATMO_CLIENT_SECRET }}
          NETATMO_ENC_PASSPHRASE: ${{ secrets.NETATMO_ENC_PASSPHRASE }}
          NETATMO_DEVICE_ID: ${{ secrets.NETATMO_DEVICE_ID }}
          NETATMO_MODULE_ID: ${{ secrets.NETATMO_MODULE_ID }}
      - name: Commit rotated token even on failure
        if: always() && steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "temperature-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add secrets/netatmo-tokens.enc
          git diff --cached --quiet && exit 0
          git commit -m "chore: rotate netatmo token"
          git pull --rebase --autostash
          git push
      - name: Commit data
        if: success() && steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "temperature-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/temperatures.json
          git diff --cached --quiet && exit 0
          git commit -m "data: actual $(TZ=America/Los_Angeles date +%F)"
          git pull --rebase --autostash
          git push
